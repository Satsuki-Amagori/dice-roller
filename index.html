<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 【ここに設置】3秒後に新しいVercelのサイトへ飛ばす設定 -->
    <meta http-equiv="refresh" content="3; url=https://trpg-amagori.vercel.app/dice">
  
    <!-- 【ここに設置】Googleに「新住所はここ」と教える設定 -->
    <link rel="canonical" href="https://trpg-amagori.vercel.app/dice">
    <title>ダイスロール</title>
    <link rel="stylesheet" href="https://satsuki-amagori.github.io/wikipedia/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>３秒後に新サイトへ移動します。</h1>
            <h1>CoCダイスロール（移転予定）</h1>
        </header>

        <main>
            <p><a href="https://satsuki-amagori.github.io/magics/">魔法検索エンジンはこちら（削除予定）</a></p>
            <p><a href="https://satsuki-amagori.github.io/wikipedia/">雨氷卓世界観百科はこちら（移転予定）</a></p>
    
            <form id="diceForm">
                <label for="numDice">ダイスの回数:</label>
                <input type="number" id="numDice" name="numDice" min="1" value="1" required>

                <label for="numSides">ダイスの面数:</label>
                <input type="number" id="numSides" name="numSides" min="1" value="100" required>

                <button type="button" id="rollButton">ダイスロール！</button>
            </form>

            <h2>結果</h2>
            <p id="result"></p>

            <!-- 音楽再生用 -->
            <audio id="diceMusic" src="dice-music.mp3" preload="auto"></audio>
        </main>

        <footer>
            <div class="footer">
                <a href="https://satsuki-amagori.github.io/portal/">ポータルページへ戻る</a>
            </div>
        </footer>
    </div>
    <script src="dice.js"></script>
</body>
</html>
